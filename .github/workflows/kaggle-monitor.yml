name: HELIX Kaggle Leaderboard Monitor

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:         # manual trigger button

# allow the workflow to push commits back
permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    concurrency:
      group: kaggle-monitor
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install kaggle requests

      - name: Poll leaderboard + alert
        env:
          COMP:            ${{ vars.COMP }}
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY:      ${{ secrets.KAGGLE_KEY }}
          MY_TEAM:         ${{ secrets.MY_TEAM }}
          RESEND_API_KEY:  ${{ secrets.RESEND_API_KEY }}
          NOTIFY_TO:       ${{ secrets.NOTIFY_TO }}
          NOTIFY_FROM:     ${{ vars.NOTIFY_FROM }}
        run: python monitor.py

      - name: Commit snapshot
        run: |
          git config user.name  "helix-kaggle-bot"
          git config user.email "helix-bot@users.noreply.github.com"
          git add state.json snapshots/
          git diff --staged --quiet || git commit -m "snapshot $(date -u +%Y-%m-%dT%H-%MZ)"
          git push
